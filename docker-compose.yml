version: "3.7"
services:
  ProjectZomboidDedicatedServer:
    image: ghcr.io/vensauro/project-zomboid-server-docker:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.arm64
      args:
        # Reads STEAMAPPBRANCH from your .env file to set the build version (ARG).
        - STEAMAPPBRANCH=${STEAMAPPBRANCH:-public}
    env_file:
      - .env
    ports:
      - "16261:16261/udp"
      - "16262:16262/udp"
      - "27015:27015/tcp"
    volumes:
      # Server data
      - ./data:/home/steam/Zomboid
      # Workshop mods folder
      - ./workshop-mods:/home/steam/pz-dedicated/steamapps/workshop
