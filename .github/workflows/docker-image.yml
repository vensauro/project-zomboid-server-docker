name: Docker Image CI

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "Dockerfile.arm64"
      - "scripts/**"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/project-zomboid-server-docker

jobs:
  build:
    name: Build (${{ matrix.platform }} / ${{ matrix.branch }})
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
        branch: [public, unstable]
        include:
          - platform: amd64
            runner: ubuntu-latest
            dockerfile: Dockerfile
          - platform: arm64
            runner: ubuntu-24.04-arm
            dockerfile: Dockerfile.arm64
          - branch: public
            tag_suffix: ""
          - branch: unstable
            tag_suffix: "-unstable"
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            STEAMAPPBRANCH=${{ matrix.branch }}
          cache-from: type=gha,scope=${{ matrix.platform }}-${{ matrix.branch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}-${{ matrix.branch }}
          tags: |
            ${{ env.IMAGE }}:latest${{ matrix.tag_suffix }}-${{ matrix.platform }}
            ${{ env.IMAGE }}:${{ github.sha }}${{ matrix.tag_suffix }}-${{ matrix.platform }}

  manifest:
    name: Publish multi-arch manifests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          SHA: ${{ github.sha }}
        run: |
          set -ex

          # stable (public) multi-arch tags
          docker buildx imagetools create -t "${IMAGE}:latest" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64"

          docker buildx imagetools create -t "${IMAGE}:${SHA}" \
            "${IMAGE}:${SHA}-amd64" \
            "${IMAGE}:${SHA}-arm64"

          # unstable multi-arch tag
          docker buildx imagetools create -t "${IMAGE}:latest-unstable" \
            "${IMAGE}:latest-unstable-amd64" \
            "${IMAGE}:latest-unstable-arm64"

          docker buildx imagetools create -t "${IMAGE}:${SHA}-unstable" \
            "${IMAGE}:${SHA}-unstable-amd64" \
            "${IMAGE}:${SHA}-unstable-arm64"
