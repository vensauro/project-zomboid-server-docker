name: Docker Image CI

on:
  schedule:
    # Server-content refresh. Final image builds on push reuse the last
    # published content image and do not contact Steam.
    - cron: "0 3 * * *"
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "Dockerfile.arm64"
      - "Dockerfile.content"
      - "scripts/**"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:
    inputs:
      refresh_server_files:
        description: "Download the latest Project Zomboid server files before building"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/project-zomboid-server-docker
  CONTENT_IMAGE: ghcr.io/${{ github.repository_owner }}/project-zomboid-server-files

jobs:
  server-files:
    name: Download server files (${{ matrix.branch }})
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.refresh_server_files)
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: public
            tag_suffix: ""
          - branch: unstable
            tag_suffix: "-unstable"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and publish server files
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.content
          push: true
          build-args: |
            STEAMAPPBRANCH=${{ matrix.branch }}
            CONTENT_REFRESH=${{ github.run_id }}
          cache-from: type=gha,scope=server-files-${{ matrix.branch }}
          cache-to: type=gha,mode=max,scope=server-files-${{ matrix.branch }}
          tags: |
            ${{ env.CONTENT_IMAGE }}:latest${{ matrix.tag_suffix }}

  build:
    name: Build (${{ matrix.platform }} / ${{ matrix.branch }})
    needs: server-files
    if: >-
      always() &&
      (needs.server-files.result == 'success' || needs.server-files.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: amd64
            branch: public
            tag_suffix: ""
            runner: ubuntu-latest
            dockerfile: Dockerfile
          - platform: arm64
            branch: public
            tag_suffix: ""
            runner: ubuntu-24.04-arm
            dockerfile: Dockerfile.arm64
          - platform: amd64
            branch: unstable
            tag_suffix: "-unstable"
            runner: ubuntu-latest
            dockerfile: Dockerfile
          - platform: arm64
            branch: unstable
            tag_suffix: "-unstable"
            runner: ubuntu-24.04-arm
            dockerfile: Dockerfile.arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            STEAMAPPBRANCH=${{ matrix.branch }}
            PZ_CONTENT_IMAGE=${{ env.CONTENT_IMAGE }}:latest${{ matrix.tag_suffix }}
          cache-from: type=gha,scope=${{ matrix.platform }}-${{ matrix.branch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}-${{ matrix.branch }}
          tags: |
            ${{ env.IMAGE }}:latest${{ matrix.tag_suffix }}-${{ matrix.platform }}
            ${{ env.IMAGE }}:${{ github.sha }}${{ matrix.tag_suffix }}-${{ matrix.platform }}

  manifest:
    name: Publish multi-arch manifests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          SHA: ${{ github.sha }}
        run: |
          set -ex

          # stable (public) multi-arch tags
          docker buildx imagetools create -t "${IMAGE}:latest" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64"

          docker buildx imagetools create -t "${IMAGE}:${SHA}" \
            "${IMAGE}:${SHA}-amd64" \
            "${IMAGE}:${SHA}-arm64"

          # unstable multi-arch tag
          docker buildx imagetools create -t "${IMAGE}:latest-unstable" \
            "${IMAGE}:latest-unstable-amd64" \
            "${IMAGE}:latest-unstable-arm64"

          docker buildx imagetools create -t "${IMAGE}:${SHA}-unstable" \
            "${IMAGE}:${SHA}-unstable-amd64" \
            "${IMAGE}:${SHA}-unstable-arm64"
