name: Docker Image CI

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "scripts/**"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the latest version
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check the latest version and push new versions
        env:
          # Push to this repository's GHCR namespace instead of Docker Hub.
          DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/project-zomboid-server-docker
        shell: bash
        run: |
          # make file runnable, might not be necessary
          chmod +x "${GITHUB_WORKSPACE}/scripts/get_updates.sh"

          # run script
          "${GITHUB_WORKSPACE}/scripts/get_updates.sh"
